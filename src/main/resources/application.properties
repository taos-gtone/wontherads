# ============================================
# File Upload Configuration
# ============================================

# Banner image upload base path (server absolute path)
file.upload.base-path=/wontherads/tomcat/webapps/upload

# Allowed image extensions
file.upload.allowed-image-extensions=jpg,jpeg,png,gif,webp

# Allowed video extensions
file.upload.allowed-video-extensions=mp4

# Max image size (bytes) - 5MB
file.upload.max-image-size=5242880

# Max video size (bytes) - 50MB
file.upload.max-video-size=52428800
